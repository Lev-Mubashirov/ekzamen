<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Инспектор сайта ОО — Прокси-анализ</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --text: #e9eefc;
      --muted: #9fb0d0;
      --line: rgba(255,255,255,.10);
      --accent: #7c5cff;
      --accent2: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --radius2: 12px;
      --focus: 0 0 0 3px rgba(124,92,255,.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(124,92,255,.25), transparent 55%),
                  radial-gradient(900px 500px at 95% 0%, rgba(34,197,94,.20), transparent 55%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      margin-bottom: 20px;
    }

    .brand .title {
      font-weight: 800;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand .badge {
      font-size: 12px;
      color: var(--muted);
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all .15s ease;
      font-weight: 650;
      font-size: 0.9rem;
    }
    button:hover { 
      transform: translateY(-1px); 
      border-color: rgba(124,92,255,.35); 
      background: rgba(124,92,255,.12); 
    }
    button:focus { outline: none; box-shadow: var(--focus); }

    .btn-accent {
      border-color: rgba(124,92,255,.45);
      background: rgba(124,92,255,.18);
    }
    .btn-ghost {
      background: transparent;
      border-style: dashed;
      color: var(--muted);
    }
    .btn-danger:hover {
      border-color: var(--bad);
      color: var(--bad);
      background: rgba(239,68,68,.1);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 16px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
    }

    .search-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .search-area input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.25);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .15s ease;
    }
    .search-area input:focus {
      border-color: rgba(124,92,255,.55);
      box-shadow: var(--focus);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .samples {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 12px;
    }

    .sample-btn {
      padding: 4px 14px;
      font-size: 0.75rem;
      border-radius: 40px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
    }
    .sample-btn:hover {
      background: rgba(124,92,255,.2);
      color: var(--text);
      border-color: var(--accent);
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      margin: 6px 0;
    }
    .status-badge.ok { background: rgba(34,197,94,.15); color: var(--accent2); }
    .status-badge.warn { background: rgba(245,158,11,.15); color: var(--warn); }
    .status-badge.bad { background: rgba(239,68,68,.15); color: var(--bad); }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 30px;
      margin: 8px 0;
    }
    .stats .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .stats .label { color: var(--muted); font-weight: 500; }
    .stats .value { font-weight: 700; }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px;
      transition: width .5s ease;
    }

    details {
      border: 1px solid var(--line);
      border-radius: var(--radius2);
      background: rgba(0,0,0,.16);
      padding: 12px;
      margin-top: 10px;
    }
    summary {
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    summary::-webkit-details-marker { display: none; }

    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-weight: 700;
      border-radius: 40px;
      font-size: 12px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
    }
    th {
      color: var(--muted);
      font-weight: 700;
      background: rgba(255,255,255,.03);
    }
    tr:last-child td { border-bottom: none; }

    .status-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.ok { background: var(--accent2); }
    .dot.warn { background: var(--warn); }
    .dot.bad { background: var(--bad); }

    .rec-list {
      list-style: none;
      padding: 0;
      margin: 8px 0 0;
    }
    .rec-list li {
      padding: 6px 0 6px 28px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>') left center/16px no-repeat;
      color: var(--muted);
      line-height: 1.5;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .history-item {
      border: 1px solid var(--line);
      border-radius: var(--radius2);
      background: rgba(0,0,0,.14);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .history-item .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .history-item .url {
      font-weight: 700;
      word-break: break-all;
      font-size: 0.9rem;
    }
    .history-item .meta {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .filter-btn {
      padding: 4px 14px;
      font-size: 0.8rem;
      border-radius: 40px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      transition: all .15s ease;
    }
    .filter-btn.active {
      background: rgba(124,92,255,.2);
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-btn:hover:not(.active) {
      border-color: rgba(255,255,255,.2);
    }

    .alert-box {
      padding: 10px 14px;
      border-radius: var(--radius2);
      margin: 8px 0;
      font-weight: 500;
    }
    .alert-box.ok { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--accent2); }
    .alert-box.warn { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: var(--warn); }
    .alert-box.bad { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--bad); }

    .hidden { display: none !important; }
    .mt-8 { margin-top: 8px; }
    .mb-8 { margin-bottom: 8px; }

    .proxy-status {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 4px 0;
    }
    .proxy-status .ok { color: var(--accent2); }
    .proxy-status .bad { color: var(--bad); }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="title">🏫 Инспектор сайта ОО</div>
      <div class="badge">Аудит по Приказу № 831 (прокси-анализ)</div>
    </div>
    <div>
      <button id="clearHistoryBtn" class="btn-ghost btn-danger">🗑 Очистить историю</button>
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <!-- Поиск -->
      <div class="search-area">
        <input id="urlInput" type="text" placeholder="https://tspk.org/" value="https://tspk.org/" />
        <button id="checkBtn" class="btn-accent">
          <span class="spinner" id="spinner"></span>
          Проверить
        </button>
      </div>

      <!-- Примеры сайтов -->
      <div class="samples">
        <span style="font-size:0.75rem;color:var(--muted);margin-right:4px;">📌 Быстрый выбор:</span>
        <button class="sample-btn" data-url="https://tspk.org/">ТСПК</button>
        <button class="sample-btn" data-url="https://tipk.ru/">ТИПК</button>
        <button class="sample-btn" data-url="https://www.tpcol.ru/">ТПК</button>
        <button class="sample-btn" data-url="https://tmk63.minobr63.ru/">ТМК</button>
      </div>

      <!-- Статус прокси -->
      <div class="proxy-status" id="proxyStatus">🔄 Проверка прокси-сервисов...</div>

      <!-- Результаты -->
      <div id="resultsContainer" class="hidden">
        <div id="alertBox" class="alert-box"></div>

        <div id="summaryBox">
          <div id="statusBadge" class="status-badge"></div>
          <div class="stats" id="statsContainer"></div>
          <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
        </div>

        <details open>
          <summary>
            <span>📋 Проверка подразделов</span>
            <span class="pill" id="subdivPill">—</span>
          </summary>
          <div id="subdivTable"></div>
        </details>

        <details>
          <summary>
            <span>💡 Рекомендации</span>
            <span class="pill" id="recPill">—</span>
          </summary>
          <ul class="rec-list" id="recList"></ul>
        </details>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
        <span style="font-weight:700;">📜 История проверок</span>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="ok">✅</button>
          <button class="filter-btn" data-filter="warn">⚠️</button>
          <button class="filter-btn" data-filter="bad">❌</button>
        </div>
      </div>
      <div class="history-list" id="historyList"></div>
      <div id="historyEmpty" class="hidden" style="color:var(--muted);text-align:center;padding:20px 0;">История пуста</div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ========== КОНФИГ ==========
  const SUBDIVISIONS = [
    { id: "main", label: "Основные сведения" },
    { id: "structure", label: "Структура и органы управления образовательной организацией" },
    { id: "docs", label: "Документы" },
    { id: "education", label: "Образование" },
    { id: "staff", label: "Руководство. Педагогический состав" },
    { id: "material", label: "Материально-техническое обеспечение" },
    { id: "paid", label: "Платные образовательные услуги" },
    { id: "finance", label: "Финансово-хозяйственная деятельность" },
    { id: "vacancies", label: "Вакантные места для приема" },
    { id: "accessible", label: "Доступная среда" },
    { id: "intl", label: "Международное сотрудничество" }
  ];

  const MAIN_SECTION_KEYWORDS = [
    "сведения об образовательной организации",
    "сведения образовательной организации",
    "сведения об оо"
  ];

  const ACCESSIBILITY_KEYWORDS = [
    "версия для слабовидящих",
    "для слабовидящих",
    "слабовидящих",
    "увеличить шрифт"
  ];

  const STORAGE_KEY = "inspector_history_v2";

  // ========== ПРОКСИ-СЕРВИСЫ (рабочие) ==========
  const PROXY_SERVICES = [
    {
      name: 'AllOrigins',
      url: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      headers: {}
    },
    {
      name: 'CorsProxy.io',
      url: (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      headers: {}
    },
    {
      name: 'CodeTabs',
      url: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
      headers: {}
    },
    {
      name: 'ThingProxy',
      url: (u) => `https://thingproxy.freeboard.io/fetch/${u}`,
      headers: {}
    },
    {
      name: 'CorsAnywhere',
      url: (u) => `https://cors-anywhere.herokuapp.com/${u}`,
      headers: { 'Origin': 'https://cors-anywhere.herokuapp.com' }
    },
    {
      name: 'ProxyCors',
      url: (u) => `https://proxy.cors.sh/${u}`,
      headers: { 'x-cors-grida-api-key': 'dummy' }
    }
  ];

  // ========== DOM ==========
  const urlInput = document.getElementById('urlInput');
  const checkBtn = document.getElementById('checkBtn');
  const spinner = document.getElementById('spinner');
  const resultsContainer = document.getElementById('resultsContainer');
  const alertBox = document.getElementById('alertBox');
  const statusBadge = document.getElementById('statusBadge');
  const statsContainer = document.getElementById('statsContainer');
  const progressFill = document.getElementById('progressFill');
  const subdivPill = document.getElementById('subdivPill');
  const subdivTable = document.getElementById('subdivTable');
  const recPill = document.getElementById('recPill');
  const recList = document.getElementById('recList');
  const historyList = document.getElementById('historyList');
  const historyEmpty = document.getElementById('historyEmpty');
  const proxyStatus = document.getElementById('proxyStatus');

  let lastReport = null;
  let currentFilter = 'all';

  // ========== УТИЛИТЫ ==========
  function $(sel) { return document.querySelector(sel); }

  function createEl(tag, cls, text) {
    const el = document.createElement(tag);
    if (cls) el.className = cls;
    if (text) el.textContent = text;
    return el;
  }

  function setContent(parent, child) {
    parent.innerHTML = '';
    parent.appendChild(child);
  }

  function normalize(s) {
    return (s || '').toString().replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function formatDate(d) {
    try {
      const date = new Date(d);
      return date.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return d; }
  }

  function isValidUrl(str) {
    try {
      const u = new URL(str);
      return ['http:', 'https:'].includes(u.protocol);
    } catch { return false; }
  }

  // ========== ЗАГРУЗКА ЧЕРЕЗ ПРОКСИ ==========
  async function fetchViaProxy(url) {
    let lastError = null;

    for (const proxy of PROXY_SERVICES) {
      try {
        const proxyUrl = proxy.url(url);
        const response = await fetch(proxyUrl, {
          method: 'GET',
          headers: {
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            ...proxy.headers
          },
          signal: AbortSignal.timeout(8000)
        });

        if (response.ok) {
          const html = await response.text();
          if (html && html.length > 500 && html.includes('<')) {
            return { html, proxy: proxy.name };
          }
        }
      } catch (e) {
        lastError = e;
        continue;
      }
    }

    throw new Error(`Все прокси недоступны. Последняя ошибка: ${lastError?.message || 'Неизвестная'}`);
  }

  // ========== АНАЛИЗ DOM ==========
  function analyzeDOM(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const body = doc.body;

    if (!body) {
      throw new Error('Не удалось извлечь содержимое страницы');
    }

    // Собираем текст из важных элементов
    const elements = body.querySelectorAll('a, h1, h2, h3, h4, p, li, span, div, nav, header, footer, main, section');
    const texts = Array.from(elements)
      .map(el => el.textContent?.trim().toLowerCase() || '')
      .filter(t => t.length > 2);

    // Собираем атрибуты ссылок
    const links = body.querySelectorAll('a');
    const attrs = Array.from(links).map(a => {
      const href = a.getAttribute('href')?.toLowerCase() || '';
      const title = a.getAttribute('title')?.toLowerCase() || '';
      return href + ' ' + title;
    }).filter(Boolean);

    const allTexts = texts.concat(attrs);

    // Поиск по ключевым словам
    function searchKeywords(keywords) {
      for (const kw of keywords) {
        const lowerKw = kw.toLowerCase();
        if (allTexts.some(t => t.includes(lowerKw) || lowerKw.includes(t))) {
          return true;
        }
      }
      return false;
    }

    // Проверка подразделов
    const subResults = SUBDIVISIONS.map(sub => {
      const keywords = sub.label.toLowerCase().split(/[\s,.]/).filter(w => w.length > 3);
      const found = searchKeywords(keywords);
      let status = found ? 'ok' : 'bad';
      let comment = found ? '✅ Найден' : '❌ Не найден';

      if (!found) {
        // Проверяем частичное совпадение
        const bodyText = body.textContent?.toLowerCase() || '';
        let partial = false;
        for (const kw of keywords) {
          if (bodyText.includes(kw)) {
            partial = true;
            break;
          }
        }
        if (partial) {
          status = 'warn';
          comment = '⚠️ Частично (отдельные слова)';
        }
      }
      return { ...sub, status, comment };
    });

    const mainFound = searchKeywords(MAIN_SECTION_KEYWORDS);
    const a11yFound = searchKeywords(ACCESSIBILITY_KEYWORDS);

    return { mainFound, a11yFound, subResults, doc };
  }

  // ========== ФОРМИРОВАНИЕ ОТЧЁТА ==========
  function buildReport(url, html, analysis) {
    const { mainFound, a11yFound, subResults } = analysis;

    const foundCount = subResults.filter(s => s.status === 'ok').length;
    const total = subResults.length;

    let overallKey = 'bad';
    if (mainFound && subResults.every(s => s.status === 'ok')) overallKey = 'ok';
    else if (mainFound && foundCount >= Math.ceil(total * 0.5)) overallKey = 'warn';

    if (a11yFound === false && overallKey === 'ok') overallKey = 'warn';

    const statusMap = {
      ok: { label: '✅ Соответствует', cls: 'ok' },
      warn: { label: '⚠️ Частично соответствует', cls: 'warn' },
      bad: { label: '❌ Не соответствует', cls: 'bad' }
    };

    const recommendations = [];
    if (!mainFound) {
      recommendations.push('Добавьте раздел «Сведения об образовательной организации» на главную страницу и в меню.');
    }
    if (!a11yFound) {
      recommendations.push('Добавьте ссылку на версию для слабовидящих (обычно в шапке сайта).');
    }
    subResults.forEach(s => {
      if (s.status === 'bad') {
        recommendations.push(`Добавьте подраздел «${s.label}» в раздел «Сведения об образовательной организации».`);
      } else if (s.status === 'warn') {
        recommendations.push(`Проверьте название подраздела «${s.label}» — возможно, оно отличается от предписанного.`);
      }
    });
    if (recommendations.length === 0) {
      recommendations.push('✅ Все обязательные элементы найдены. Сайт соответствует Приказу № 831.');
    }

    return {
      url,
      timestamp: new Date().toISOString(),
      overallKey,
      overallLabel: statusMap[overallKey].label,
      mainFound,
      a11yFound,
      foundCount,
      total,
      subResults,
      recommendations,
      htmlLength: html.length
    };
  }

  // ========== ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ ==========
  function renderReport(report) {
    resultsContainer.classList.remove('hidden');

    // Статус
    const statusMap = {
      ok: { label: '✅ Соответствует', cls: 'ok' },
      warn: { label: '⚠️ Частично соответствует', cls: 'warn' },
      bad: { label: '❌ Не соответствует', cls: 'bad' }
    };
    const st = statusMap[report.overallKey] || statusMap.bad;
    statusBadge.textContent = st.label;
    statusBadge.className = `status-badge ${st.cls}`;

    // Статистика
    statsContainer.innerHTML = '';
    const stats = [
      { label: 'Найдено подразделов:', value: `${report.foundCount} из ${report.total}` },
      { label: 'Раздел «Сведения об ОО»:', value: report.mainFound ? '✅ Найден' : '❌ Не найден' },
      { label: 'Версия для слабовидящих:', value: report.a11yFound ? '✅ Есть' : '❌ Нет' }
    ];
    stats.forEach(s => {
      const div = createEl('div', 'stat');
      div.innerHTML = `<span class="label">${s.label}</span> <span class="value">${s.value}</span>`;
      statsContainer.appendChild(div);
    });

    // Прогресс
    const pct = Math.round((report.foundCount / report.total) * 100);
    progressFill.style.width = pct + '%';

    // Подразделы
    subdivPill.textContent = `${report.foundCount}/${report.total}`;
    const table = createEl('table');
    const thead = createEl('thead');
    const trh = createEl('tr');
    ['Подраздел', 'Статус', 'Комментарий'].forEach(t => {
      const th = createEl('th');
      th.textContent = t;
      trh.appendChild(th);
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = createEl('tbody');
    report.subResults.forEach(s => {
      const tr = createEl('tr');
      const td1 = createEl('td');
      td1.textContent = s.label;

      const td2 = createEl('td');
      const statusSpan = createEl('span', 'status-cell');
      const dot = createEl('span', `dot ${s.status}`);
      const text = createEl('span', '', s.status === 'ok' ? 'Найден' : s.status === 'warn' ? 'Частично' : 'Не найден');
      statusSpan.appendChild(dot);
      statusSpan.appendChild(text);
      td2.appendChild(statusSpan);

      const td3 = createEl('td');
      td3.textContent = s.comment || '—';

      tr.appendChild(td1);
      tr.appendChild(td2);
      tr.appendChild(td3);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    setContent(subdivTable, table);

    // Рекомендации
    recPill.textContent = report.recommendations.length + ' пунктов';
    recList.innerHTML = '';
    report.recommendations.forEach(text => {
      const li = createEl('li');
      li.textContent = text;
      recList.appendChild(li);
    });

    // Сохраняем в историю
    saveToHistory(report);

    // Обновляем лейбл кнопки
    checkBtn.innerHTML = '✅ Проверено';
    setTimeout(() => {
      checkBtn.innerHTML = '🔍 Проверить';
    }, 3000);
  }

  function showAlert(type, message) {
    alertBox.className = `alert-box ${type}`;
    alertBox.textContent = message;
    alertBox.style.display = 'block';
  }

  function hideAlert() {
    alertBox.style.display = 'none';
  }

  // ========== ИСТОРИЯ ==========
  function loadHistory() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch { return []; }
  }

  function saveToHistory(report) {
    const history = loadHistory();
    history.unshift({
      url: report.url,
      timestamp: report.timestamp,
      overallKey: report.overallKey,
      overallLabel: report.overallLabel,
      foundCount: report.foundCount,
      total: report.total
    });
    if (history.length > 100) history.pop();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const history = loadHistory();
    const filtered = history.filter(item => {
      if (currentFilter === 'all') return true;
      return item.overallKey === currentFilter;
    });

    historyList.innerHTML = '';
    if (filtered.length === 0) {
      historyEmpty.classList.remove('hidden');
      return;
    }
    historyEmpty.classList.add('hidden');

    filtered.slice(0, 50).forEach(item => {
      const div = createEl('div', 'history-item');
      const top = createEl('div', 'top');
      const url = createEl('span', 'url', item.url);
      const statusMap = { ok: '✅', warn: '⚠️', bad: '❌' };
      const status = createEl('span', '', `${statusMap[item.overallKey] || '❓'} ${item.foundCount}/${item.total}`);
      top.appendChild(url);
      top.appendChild(status);

      const meta = createEl('div', 'meta', formatDate(item.timestamp));
      div.appendChild(top);
      div.appendChild(meta);
      historyList.appendChild(div);
    });
  }

  // ========== ОСНОВНАЯ ЛОГИКА ==========
  async function runCheck() {
    const url = urlInput.value.trim();
    if (!url) {
      showAlert('bad', 'Введите URL сайта');
      return;
    }

    if (!isValidUrl(url)) {
      showAlert('bad', 'Некорректный URL. Используйте http:// или https://');
      return;
    }

    // Сбрасываем состояние
    resultsContainer.classList.add('hidden');
    hideAlert();
    checkBtn.disabled = true;
    checkBtn.innerHTML = '<span class="spinner"></span> Загрузка...';
    proxyStatus.textContent = '🔄 Подключение к прокси-сервисам...';
    proxyStatus.style.color = 'var(--muted)';

    try {
      const result = await fetchViaProxy(url);
      proxyStatus.innerHTML = `✅ Загружено через <span class="ok">${result.proxy}</span> (${Math.round(result.html.length / 1024)} KB)`;

      const analysis = analyzeDOM(result.html);
      const report = buildReport(url, result.html, analysis);
      lastReport = report;
      renderReport(report);

    } catch (error) {
      proxyStatus.innerHTML = `❌ <span class="bad">Ошибка загрузки</span>`;
      showAlert('bad', `Не удалось загрузить сайт: ${error.message}`);
    } finally {
      checkBtn.disabled = false;
      checkBtn.innerHTML = '🔍 Проверить';
    }
  }

  // ========== СОБЫТИЯ ==========
  document.getElementById('checkBtn').addEventListener('click', runCheck);

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runCheck();
  });

  // Примеры сайтов
  document.querySelectorAll('.sample-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      urlInput.value = btn.dataset.url;
      runCheck();
    });
  });

  // Фильтры истории
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderHistory();
    });
  });

  // Очистка истории
  document.getElementById('clearHistoryBtn').addEventListener('click', () => {
    if (confirm('Удалить всю историю проверок?')) {
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
    }
  });

  // ========== СТАРТ ==========
  renderHistory();
  proxyStatus.textContent = '✅ Прокси-сервисы готовы (6 источников)';
  proxyStatus.style.color = 'var(--accent2)';

})();
</script>
</body>
</html>
